  <!-- WARVENA text -->
  <text x="145" y="52" 
    font-family="Arial, sans-serif" 
    font-size="28" 
    font-weight="800" 
    letter-spacing="4"
    fill="#2d2d2d">WARVENA</text>

  <!-- CONSTRUCTION text -->
  <text x="147" y="70" 
    font-family="Arial, sans-serif" 
    font-size="11" 
