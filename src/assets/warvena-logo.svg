<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <!-- Left mountain (outer triangle) -->
  <polygon points="20,80 45,30 70,80" fill="none" stroke="#2d2d2d" stroke-width="3"/>
  <!-- Left mountain (inner triangle) -->
  <polygon points="28,80 45,48 62,80" fill="#2d2d2d"/>

  <!-- Middle mountain (outer triangle) -->
  <polygon points="50,80 75,25 100,80" fill="none" stroke="#2d2d2d" stroke-width="3"/>
  <!-- Middle mountain (inner triangle) -->
